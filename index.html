       <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点菜</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const menu = [

{ id:1,name:"红烧肉",price:38,category:"热菜",image:"https://images.unsplash.com/photo-1604908176997-431c3c1d76fd?q=80&w=800"},

{ id:2,name:"宫保鸡丁",price:32,category:"热菜",image:"https://images.unsplash.com/photo-1603133872878-684f208fb84b?q=80&w=800"},

{ id:3,name:"番茄炒蛋",price:18,category:"热菜",image:"https://images.unsplash.com/photo-1625944525903-b0f5dc4f9b9c?q=80&w=800"},

{ id:4,name:"拍黄瓜",price:12,category:"凉菜",image:"https://images.unsplash.com/photo-1559847844-5315695dadae?q=80&w=800"},

{ id:5,name:"米饭",price:2,category:"主食",image:"https://images.unsplash.com/photo-1604909053197-8b4d7e3b2a8f?q=80&w=800"},

{ id:6,name:"可乐",price:5,category:"饮料",image:"https://images.unsplash.com/photo-1622484212850-eb596d769edc?q=80&w=800"}

]

function App(){

const isAdmin = window.location.hash === "#admin"

const [cart,setCart]=React.useState({})
const [orders,setOrders]=React.useState([])
const [category,setCategory]=React.useState("全部")

const categories=["全部",...new Set(menu.map(i=>i.category))]

React.useEffect(()=>{
const saved=localStorage.getItem("orders")
if(saved) setOrders(JSON.parse(saved))
},[])

React.useEffect(()=>{
const handler=()=>{
const saved=localStorage.getItem("orders")
if(saved) setOrders(JSON.parse(saved))
}
window.addEventListener("storage",handler)
return()=>window.removeEventListener("storage",handler)
},[])

const saveOrders=(data)=>{
localStorage.setItem("orders",JSON.stringify(data))
setOrders(data)
}

const add=i=>{
setCart(p=>({...p,[i.id]:{...i,qty:(p[i.id]?.qty||0)+1}}))
}

const remove=i=>{
setCart(p=>{
const q=(p[i.id]?.qty||0)-1
if(q<=0){const n={...p};delete n[i.id];return n}
return {...p,[i.id]:{...i,qty:q}}
})
}

const submit=()=>{
const newOrders=[...orders,cart]
saveOrders(newOrders)
setCart({})
alert("点菜成功")
}

const merged={}
orders.forEach(o=>{
Object.values(o).forEach(i=>{
if(!merged[i.id]) merged[i.id]={...i,qty:0}
merged[i.id].qty+=i.qty
})
})

const total=Object.values(merged)
.reduce((s,i)=>s+i.price*i.qty,0)

if(isAdmin){
return(
<div class="p-4 max-w-md mx-auto">
<h1 class="text-xl font-bold mb-3">总订单</h1>

{Object.values(merged).map(i=>(
<div class="flex justify-between border-b py-2">
<div>{i.name} × {i.qty}</div>
<div>¥{i.price*i.qty}</div>
</div>
))}

<div class="font-bold mt-3">
总价 ¥{total}
</div>

<button
class="mt-4 w-full bg-red-500 text-white p-2"
onClick={()=>{localStorage.removeItem("orders");setOrders([])}}
>
清空订单
</button>

</div>
)
}

const filtered=category==="全部"
?menu
:menu.filter(i=>i.category===category)

return(
<div class="max-w-md mx-auto pb-24">

<div class="flex overflow-x-auto gap-2 p-2 sticky top-0 bg-white">
{categories.map(c=>(
<button
class={`px-3 py-1 rounded-full border whitespace-nowrap ${category===c?"bg-black text-white":"bg-white"}`}
onClick={()=>setCategory(c)}
>
{c}
</button>
))}
</div>

{filtered.map(i=>{
const qty=cart[i.id]?.qty||0

return(
<div class="border m-2 rounded-xl overflow-hidden">

<img src={i.image} class="w-full h-40 object-cover"/>

<div class="p-2 flex justify-between items-center">

<div>
<div class="font-bold">{i.name}</div>
<div>¥{i.price}</div>
</div>

<div class="flex items-center gap-2">

<button class="px-3 border" onClick={()=>remove(i)}>-</button>

<div class="w-6 text-center">{qty}</div>

<button class="px-3 bg-black text-white" onClick={()=>add(i)}>+</button>

</div>
</div>
</div>
)
})}

<div class="fixed bottom-0 left-0 right-0 bg-white p-3 border-t">
<button class="w-full bg-black text-white p-3" onClick={submit}>
提交点菜
</button>
</div>

</div>
)
}

ReactDOM.render(<App/>,document.getElementById("root"))

</script>
</body>
</html>
