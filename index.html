<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body class="bg-[#FFF8F0]">
<div id="root"></div>

<script type="text/babel">

const firebaseConfig = {
apiKey: "你的",
authDomain: "你的",
databaseURL: "你的",
projectId: "你的",
storageBucket: "你的",
messagingSenderId: "你的",
appId: "你的"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const menu = [
{ id:1,name:"卤鸡腿",price:7,category:"热菜",image:"食物图/卤鸡腿.jpg"},
{ id:2,name:"四喜烤麸",price:28,category:"凉菜",image:"食物图/四喜烤麸.jpg"},
{ id:3,name:"水煮鱼片",price:68,category:"热菜",image:"食物图/水煮鱼片.jpg"},
{ id:4,name:"火锅",price:9999,category:"热菜",image:"食物图/火锅.jpg"},
{ id:5,name:"糖醋里脊",price:39,category:"热菜",image:"食物图/卤鸡腿.jpg"},
{ id:6,name:"蟹炒年糕",price:88,category:"热菜",image:"食物图/蟹炒年糕.jpg"},
{ id:7,name:"辣子鸡",price:66,category:"热菜",image:"食物图/辣子鸡.jpg"},
{ id:8,name:"酱鸭",price:99,category:"热菜",image:"食物图/酱鸭.jpg"},
{ id:9,name:"锅包肉",price:39,category:"热菜",image:"食物图/锅包肉.jpg"},
{ id:10,name:"青椒肉丝",price:29,category:"热菜",image:"食物图/青椒肉丝.jpg"}
]

function App(){

const [cart,setCart]=React.useState({})
const [orders,setOrders]=React.useState([])
const [category,setCategory]=React.useState("全部")
const [showCart,setShowCart]=React.useState(false)
const [preview,setPreview]=React.useState(null)
const [success,setSuccess]=React.useState(false)

const categories=["全部","热菜","凉菜","点心","饮品","汤","减脂菜"]

React.useEffect(()=>{
db.ref("orders").on("value",s=>{
const data=s.val()
setOrders(data?Object.values(data):[])
})
},[])

const add=i=>{
setCart(p=>({...p,[i.id]:{...i,qty:(p[i.id]?.qty||0)+1}}))
}

const remove=i=>{
setCart(p=>{
const q=(p[i.id]?.qty||0)-1
if(q<=0){
const n={...p}
delete n[i.id]
return n
}
return {...p,[i.id]:{...i,qty:q}}
})
}

const submit=()=>{
db.ref("orders").push(cart)
setCart({})
setShowCart(false)
setSuccess(true)
}

const filtered=category==="全部"?menu:menu.filter(i=>i.category===category)

const totalCount=Object.values(cart).reduce((s,i)=>s+i.qty,0)
const totalPrice=Object.values(cart).reduce((s,i)=>s+i.qty*i.price,0)

return(
<div class="pb-32">

{/* header */}
<div class="bg-gradient-to-r from-red-700 to-red-900 p-4 text-white shadow-lg">
<div class="text-xl font-bold">云味轩</div>
<div class="text-xs opacity-70">在线点菜系统</div>
</div>

{/* 分类 */}
<div class="flex gap-2 overflow-x-auto p-3 bg-white sticky top-0">
{categories.map(c=>(
<button
class={`px-4 py-1 rounded-full border ${category===c?"bg-red-700 text-white":""}`}
onClick={()=>setCategory(c)}
>
{c}
</button>
))}
</div>

{/* 菜单 */}
<div class="grid grid-cols-2 gap-3 p-3">
{filtered.map(i=>{
const qty=cart[i.id]?.qty||0

return(
<div class="bg-white rounded-xl shadow overflow-hidden">

<img
src={i.image}
class="w-full h-32 object-cover"
onClick={()=>setPreview(i)}
/>

<div class="p-2">
<div class="font-bold">{i.name}</div>
<div class="text-red-700 font-bold">¥{i.price}</div>

<div class="flex justify-end items-center gap-2 mt-2">

{qty>0 && (
<button onClick={()=>remove(i)}
class="w-7 h-7 rounded-full border border-red-700 text-red-700">
-
</button>
)}

{qty>0 && <div>{qty}</div>}

<button
onClick={()=>add(i)}
class="w-7 h-7 rounded-full bg-red-700 text-white"
>
+
</button>

</div>
</div>

</div>
)
})}
</div>

{/* 购物车浮动 */}
{totalCount>0 && (
<div
onClick={()=>setShowCart(true)}
class="fixed bottom-4 left-4 right-4 bg-red-700 text-white p-3 rounded-full flex justify-between shadow-lg"
>
<div>🛒 {totalCount}件</div>
<div>¥{totalPrice}</div>
</div>
)}

{/* 购物车 */}
{showCart && (
<div class="fixed inset-0 bg-black/40 flex items-end">

<div class="bg-white w-full rounded-t-2xl p-4">

<h2 class="font-bold mb-2">购物车</h2>

{Object.values(cart).map(i=>(
<div class="flex justify-between border-b py-2">
<div>{i.name} x {i.qty}</div>
<div>¥{i.price*i.qty}</div>
</div>
))}

<button
class="w-full bg-red-700 text-white p-3 mt-3 rounded-full"
onClick={submit}
>
确认提交
</button>

</div>
</div>
)}

{/* 成功 */}
{success && (
<div class="fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white p-6 rounded-xl text-center">

<div class="text-3xl mb-2">✅</div>
<div class="font-bold mb-3">点菜成功</div>

<button
class="bg-red-700 text-white px-6 py-2 rounded-full"
onClick={()=>setSuccess(false)}
>
继续点菜
</button>

</div>
</div>
)}

{/* 图片放大 */}
{preview && (
<div
class="fixed inset-0 bg-black/80 flex items-center justify-center"
onClick={()=>setPreview(null)}
>
<img src={preview.image} class="max-w-full max-h-full"/>
</div>
)}

</div>
)
}

ReactDOM.render(<App/>,document.getElementById("root"))

</script>

</body>
</html>
